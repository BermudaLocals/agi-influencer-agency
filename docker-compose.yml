version: '3.8'
services:
  app:
    build: .
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=influencer_agency
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine

volumes:
  postgres-data:
